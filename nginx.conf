# nginx.conf — template, $PORT is replaced at startup by start.sh (envsubst)
# All other $variables are nginx built-ins and are left untouched.

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;

    sendfile           on;
    keepalive_timeout  65;

    # Allow large file uploads (images/videos up to 200 MB)
    client_max_body_size 200M;

    # Gzip compression for web assets
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;

    # FastAPI upstream (uvicorn, internal only)
    upstream fastapi {
        server 127.0.0.1:8000;
    }

    server {
        listen $PORT default_server;
        server_name _;

        root  /app/frontend/build;
        index index.html;

        # ── Health check — answered directly by nginx, no uvicorn dependency ──
        # Railway pings this every few seconds; must respond even if uvicorn is down
        location = /health {
            add_header Content-Type application/json;
            return 200 '{"status":"healthy"}';
        }

        # ── API routes → FastAPI (^~ = priority over regex locations) ────────
        location ^~ /api/ {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
            client_max_body_size 200M;
        }

        # ── Swagger / OpenAPI docs → FastAPI ─────────────────────────────────
        location /docs {
            proxy_pass       http://fastapi;
            proxy_set_header Host $http_host;
        }

        location /openapi.json {
            proxy_pass       http://fastapi;
            proxy_set_header Host $http_host;
        }

        # ── Static assets (JS, CSS, images…) — long cache ───────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            expires            1y;
            add_header         Cache-Control "public, immutable";
            try_files          $uri =404;
        }

        # ── React Router SPA fallback ────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
